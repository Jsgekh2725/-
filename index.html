<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DirectDrop | File Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <header class="navbar">
    <div class="logo">DirectDrop</div>
    <button class="nav-btn">Cloud Upload</button>
  </header>

  <main class="hero">
    <div class="hero-box">
      <div class="badge">⚡ رفع سريع + رابط مباشر</div>

      <h1>
        ارفع ملفاتك واحصل على
        <span>رابط تحميل مباشر</span>
      </h1>

      <p class="subtitle">
        موقع احترافي بواجهة عصرية وتأثيرات أنميشن كاملة.
        ارفع أي ملف وسيتم إنشاء رابط مباشر لمشاركته فوراً.
      </p>

      <div class="upload-card">
        <div class="upload-icon">⬆</div>

        <input type="file" id="fileInput" hidden>
        <button class="upload-btn" id="pickBtn">
          اختيار ملف
        </button>

        <p class="file-name" id="fileName">لم يتم اختيار ملف</p>

        <button class="generate-btn" id="uploadBtn">
          إنشاء الرابط
        </button>

        <div class="loader hidden" id="loader">
          <div class="spinner"></div>
          <span>جارٍ رفع الملف...</span>
        </div>

        <div class="result hidden" id="resultBox">
          <input type="text" id="resultLink" readonly>
          <button id="copyBtn">نسخ الرابط</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
