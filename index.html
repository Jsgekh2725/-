<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Void</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
<div class="sidebar-top">
<h2>BLACK VOID</h2>
<button class="close-btn" onclick="toggleMenu()">✕</button>
</div>

<button onclick="showPage('uploadPage')">رفع ملف</button>
<button onclick="showPage('modsPage')">مودات بلاك فويد</button>
<button onclick="openAdmin()">الادمن</button>
</div>

<div class="container">

<section id="uploadPage" class="page active">
<div class="glass">
<h1>رفع ملف</h1>

<input type="file" id="mainFile">

<button class="main-btn" onclick="generateLink()">إنشاء رابط</button>

<div id="result"></div>
</div>
</section>

<section id="modsPage" class="page">
<div class="glass">
<h1>مودات Black Void</h1>

<input id="searchInput" placeholder="بحث..." onkeyup="loadMods()">

<select id="categoryFilter" onchange="loadMods()">
<option value="all">كل التصنيفات</option>
<option>مود باك</option>
<option>مودات</option>
<option>شادرات</option>
<option>مابات</option>
<option>لايتماتكل</option>
</select>

<div id="modsContainer" class="mods-grid"></div>
</div>
</section>

<section id="adminPage" class="page">
<div class="glass">
<h1>لوحة الادمن</h1>

<input id="modName" placeholder="اسم المود">
<textarea id="modDesc" placeholder="شرح المود"></textarea>

<select id="modCategory">
<option>مود باك</option>
<option>مودات</option>
<option>شادرات</option>
<option>مابات</option>
<option>لايتماتكل</option>
</select>

<input type="file" id="modImage">
<input type="file" id="modFile">

<button class="main-btn" onclick="saveMod()">رفع المود</button>

<div id="adminMods" class="mods-grid"></div>
</div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
